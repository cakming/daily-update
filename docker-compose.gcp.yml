# Production stack for a GCP Compute Engine VM.
#
# Key differences from docker-compose.prod.yml:
#   - NO mongodb service. Mongo already runs on a separate in-network server;
#     point MONGODB_URI at its private IP (e.g. 10.128.0.x:27017).
#   - A single nginx reverse proxy terminates TLS on 443 and fans out to the
#     frontend (static) and backend (/api). Only 80/443 are published on the VM.
#   - No Redis: auth is stateless JWT and rate-limiting is in-process, so the
#     single Node container needs no external cache/session store.
#
# Usage:
#   cp .env.gcp.example .env
#   # edit .env, then:
#   docker compose -f docker-compose.gcp.yml --env-file .env up -d --build
#
# See docs/GCP_VM_DEPLOYMENT.md for the full runbook.

services:
  # Backend API — runs the Express app plus the in-process scheduler, digest
  # scheduler, and Telegram bot. Single instance only (the cron jobs are not
  # safe to run in parallel across replicas).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: daily-update-backend:latest
    container_name: daily-update-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      # MONGODB_URI, JWT_SECRET, ANTHROPIC_API_KEY, SMTP_*, TELEGRAM_BOT_TOKEN,
      # CLIENT_URL, etc. all come from .env (see .env.gcp.example).
    expose:
      - "5000"
    networks:
      - daily-update-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend — Vite build baked at image-build time, served by nginx on :80.
  # VITE_API_URL must be the public URL the browser will hit (same origin as
  # the proxy, so requests to /api are same-origin and need no CORS).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    image: daily-update-frontend:latest
    container_name: daily-update-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - daily-update-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Edge reverse proxy — the only container that publishes ports on the VM.
  # Terminates TLS, redirects 80->443, proxies / to the frontend and /api to
  # the backend so the whole app is same-origin.
  proxy:
    image: nginx:alpine
    container_name: daily-update-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/gcp/default.conf:/etc/nginx/conf.d/default.conf:ro
      # TLS material. Point these at wherever your certs live on the VM.
      # With certbot the default is /etc/letsencrypt (see the runbook).
      - ${TLS_CERT_DIR:-./nginx/gcp/certs}:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - daily-update-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  daily-update-network:
    driver: bridge

volumes:
  # Shared webroot for the certbot HTTP-01 challenge (optional; see runbook).
  certbot_webroot:
    driver: local
