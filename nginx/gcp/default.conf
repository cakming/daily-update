# Edge reverse proxy for the GCP VM deployment.
#
# Responsibilities:
#   - Redirect all HTTP to HTTPS (while leaving the ACME challenge path open so
#     certbot can renew).
#   - Terminate TLS.
#   - Serve the SPA (proxied to the frontend container) and the API (proxied to
#     the backend container) from a single origin.
#
# BEFORE FIRST BOOT: replace daily-update.example.com below with your real
# domain, and make sure the cert files exist at the mounted paths (see
# docs/GCP_VM_DEPLOYMENT.md — the "Obtain a TLS certificate" step). If you use
# certbot with the default layout and mount /etc/letsencrypt as
# /etc/nginx/certs, the ssl_certificate paths below are already correct.

# --- HTTP: redirect to HTTPS, but answer ACME challenges in place -------------
server {
    listen 80;
    listen [::]:80;
    server_name daily-update.example.com;

    # Let certbot's webroot plugin answer HTTP-01 challenges without a redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: terminate TLS, proxy to frontend + backend -----------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name daily-update.example.com;

    # certbot layout: /etc/letsencrypt/live/<domain>/{fullchain,privkey}.pem
    ssl_certificate     /etc/nginx/certs/live/daily-update.example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/daily-update.example.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (HSTS only once you're confident HTTPS is stable).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Allow reasonably large update payloads (AI-generated content can be big).
    client_max_body_size 10m;

    # API -> backend container. Note: no trailing slash on proxy_pass so the
    # /api prefix is preserved (the Express routes are mounted under /api).
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # AI generation can take a while.
        proxy_send_timeout 120s;
    }

    # Everything else -> frontend container (nginx serving the SPA build).
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
