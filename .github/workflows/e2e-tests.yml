name: E2E Tests

# Disabled auto-triggering (manual dispatch only; workflow_call kept so ci.yml
# can still reference it). GitHub Actions cannot start jobs on this account, so
# push/pull_request runs only produced failing checks that blocked merges.
# Re-enable by restoring the push/pull_request triggers once Actions is available.
on:
  workflow_dispatch:
  workflow_call:

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      - name: Start backend server
        working-directory: ./backend
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/daily-update-e2e
          JWT_SECRET: test-jwt-secret-for-e2e
          # generateToken() passes `expiresIn: process.env.JWT_EXPIRE` to
          # jwt.sign(); if unset, jsonwebtoken rejects the explicit `undefined`
          # and registration/login 500s. Provide a valid timespan.
          JWT_EXPIRE: 7d
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLIENT_URL: http://localhost:3000
        run: |
          npm start &
          echo $! > backend.pid
          # Wait for backend to be ready
          timeout 60 bash -c 'until curl -f http://localhost:5000/api/health; do sleep 2; done'

      - name: Run E2E tests
        working-directory: ./frontend
        # AI-dependent specs (daily-updates / weekly-updates) call the real
        # Anthropic API and are opt-in: they skip unless RUN_AI_E2E is set, so we
        # deliberately do NOT set it here. A dummy/empty ANTHROPIC_API_KEY is fine
        # for the smoke/auth flows, which need no AI. To exercise the AI specs
        # locally, provide a live key and set RUN_AI_E2E=1.
        env:
          VITE_API_URL: http://localhost:5000/api
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: frontend/test-results
          retention-days: 7

      - name: Stop backend server
        if: always()
        run: |
          if [ -f backend/backend.pid ]; then
            kill $(cat backend/backend.pid) || true
          fi

      - name: Comment E2E results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const comment = `## 🎭 E2E Tests Completed

            E2E tests have finished running. Check the workflow logs for details.

            [View Playwright Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
